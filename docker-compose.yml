version: '3.9'

services:
  mongo:
    image: mongo:7
    container_name: blog-platform-mongo
    ports:
      - '27017:27017'
    volumes:
      - mongo-data:/data/db

  auth-service:
    build: ./auth-service
    container_name: blog-platform-auth
    environment:
      PORT: 5001
      MONGODB_URI: mongodb://mongo:27017/blog_auth
      JWT_SECRET: replace_with_a_strong_secret
      AWS_ACCESS_KEY_ID: your_aws_access_key_id
      AWS_SECRET_ACCESS_KEY: your_aws_secret_access_key
      AWS_REGION: us-east-1
      AWS_S3_BUCKET: your_s3_bucket_name
    ports:
      - '5001:5001'
    depends_on:
      - mongo

  blog-service:
    build: ./blog-service
    container_name: blog-platform-blog
    environment:
      PORT: 5002
      MONGODB_URI: mongodb://mongo:27017/blog_content
      JWT_SECRET: replace_with_a_strong_secret
      AWS_ACCESS_KEY_ID: your_aws_access_key_id
      AWS_SECRET_ACCESS_KEY: your_aws_secret_access_key
      AWS_REGION: us-east-1
      AWS_S3_BUCKET: your_s3_bucket_name
    ports:
      - '5002:5002'
    depends_on:
      - mongo

  frontend:
    build: ./frontend
    container_name: blog-platform-frontend
    environment:
      REACT_APP_AUTH_API_URL: http://localhost:5001/api
      REACT_APP_BLOG_API_URL: http://localhost:5002/api
    ports:
      - '3000:3000'
    depends_on:
      - auth-service
      - blog-service

volumes:
  mongo-data:
