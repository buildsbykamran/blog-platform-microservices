version: '3.8'

services:
  auth-service:
    build:
      context: .
      dockerfile: Dockerfile.auth
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=development
      - PORT=3001
      - MONGODB_URI=mongodb://admin:password@mongo:27017/blog-auth?authSource=admin
      - JWT_SECRET=your-secret-key
    depends_on:
      - mongo
    networks:
      - blog-network

  blog-service:
    build:
      context: .
      dockerfile: Dockerfile.blog
    ports:
      - "3002:3002"
    environment:
      - NODE_ENV=development
      - PORT=3002
      - MONGODB_URI=mongodb://admin:password@mongo:27017/blog-posts?authSource=admin
      - AUTH_SERVICE_URL=http://auth-service:3001
      - JWT_SECRET=your-secret-key
      - AWS_ACCESS_KEY_ID=your-access-key
      - AWS_SECRET_ACCESS_KEY=your-secret-access-key
      - AWS_S3_BUCKET=your-bucket
      - AWS_REGION=us-east-1
    depends_on:
      - mongo
    networks:
      - blog-network

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        REACT_APP_API_URL: http://localhost:3001/api
    ports:
      - "3000:80"
    depends_on:
      - auth-service
      - blog-service
    networks:
      - blog-network

  mongo:
    image: mongo:6.0
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      - MONGO_INITDB_ROOT_USERNAME=admin
      - MONGO_INITDB_ROOT_PASSWORD=password
    networks:
      - blog-network

volumes:
  mongo_data:

networks:
  blog-network:
    driver: bridge
