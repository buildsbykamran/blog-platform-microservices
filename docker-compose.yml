services:
  mongodb:
    image: mongo:latest
    container_name: blog-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - blog-network

  auth-service:
    build:
      context: ./auth-service
      dockerfile: Dockerfile
    image: ${AUTH_IMAGE:-blog-platform-auth:latest}
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: production
      PORT: 3001
      MONGODB_URI: ${MONGODB_URI}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRE: ${JWT_EXPIRE:-7d}
      CORS_ORIGIN: ${CORS_ORIGIN}
    depends_on:
      - mongodb
    restart: unless-stopped
    networks:
      - blog-network

  blog-service:
    build:
      context: ./blog-service
      dockerfile: Dockerfile
    image: ${BLOG_IMAGE:-blog-platform-blog:latest}
    ports:
      - "3002:3002"
    environment:
      NODE_ENV: production
      PORT: 3002
      MONGODB_URI: ${MONGODB_URI}
      AUTH_SERVICE_URL: ${AUTH_SERVICE_URL:-http://auth-service:3001/auth}
      JWT_SECRET: ${JWT_SECRET}
      AWS_S3_BUCKET: ${AWS_S3_BUCKET}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      CORS_ORIGIN: ${CORS_ORIGIN}
    depends_on:
      - mongodb
      - auth-service
    restart: unless-stopped
    networks:
      - blog-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        REACT_APP_AUTH_URL: ${REACT_APP_AUTH_URL:-http://auth-service:3001}
        REACT_APP_BLOG_URL: ${REACT_APP_BLOG_URL:-http://blog-service:3002}
        REACT_APP_AWS_S3_URL: ${REACT_APP_AWS_S3_URL}
    image: ${FRONTEND_IMAGE:-blog-platform-frontend:latest}
    ports:
      - "3000:80"
    depends_on:
      - auth-service
      - blog-service
    restart: unless-stopped
    networks:
      - blog-network

networks:
  blog-network:
    driver: bridge

volumes:
  mongo-data:
    driver: local